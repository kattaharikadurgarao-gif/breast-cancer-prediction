<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breast Cancer Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
        }
        form {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #218838;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background-color: #e2ffe2;
            border: 1px solid #28a745;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Breast Cancer Prediction</h1>
    <form id="predictionForm">
        <label for="feature1">Feature 1:</label>
        <input type="number" id="feature1" required>
        <label for="feature2">Feature 2:</label>
        <input type="number" id="feature2" required>
        <!-- Add more feature inputs as needed -->
        <button type="submit">Predict</button>
    </form>
    <div class="result" id="result" style="display:none;"></div>
    <script>
        document.getElementById('predictionForm').onsubmit = function(event) {
            event.preventDefault();
            // Input validation can be added here
            const feature1 = document.getElementById('feature1').value;
            const feature2 = document.getElementById('feature2').value;
            // Add additional features as needed
            document.getElementById('result').innerHTML = `Prediction result based on features\n Feature 1: ${feature1}\n Feature 2: ${feature2}`;
            document.getElementById('result').style.display = 'block';
        };
    </script>
</body>
</html>
